# model/model_config.yaml
# YOLOv8n-face 配置文件
# GPU: RTX 3060 Laptop 6GB → batch_size=8

# 模型选型
model_name: "yolov8n.pt"      # ultralytics pretrained weights, fine-tuned on face data
input_size: [640, 640]

# 网络结构
architecture:
  backbone: "default"
  neck: "default"
  head: "default"

# 训练超参数
training:
  epochs: 100
  batch_size: 8
  accumulation_steps: 2
  imgsz: 640
  optimizer: "AdamW"
  lr0: 0.001
  lrf: 0.00001
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 3
  warmup_momentum: 0.8
  warmup_bias_lr: 0.1
  cos_lr: true
  amp: true
  workers: 2
  mosaic: 1.0
  mixup: 0.0
  copy_paste: 0.0
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  degrees: 0.0
  translate: 0.1
  scale: 0.5
  shear: 0.0
  perspective: 0.0
  flipud: 0.0
  fliplr: 0.5
  multi_scale: false
